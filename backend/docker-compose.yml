services:
  auth:
    image: transcendence-auth:1.0
    container_name: transcendence_auth
    build:
      context: ./Auth
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./Auth/.env
    ports:
      - "3000:3000"

  recipes:
    image: transcendence-recipes:1.0
    container_name: transcendence_recipes
    build:
      context: ./Recipes
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=3000
    ports:
      - "3001:3000"
