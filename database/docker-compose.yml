services:
  postgres:
    container_name: brunchio_db
    image: postgres:12.3-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - postgres:/var/lib/postgresql/data

  pgadmin:
    container_name: brunchio_pgadmin
    image: dpage/pgadmin4:9.13
    env_file:
      - .env
    ports:
      - 15432:80
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres:
  pgadmin:

